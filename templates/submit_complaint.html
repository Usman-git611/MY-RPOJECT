{% extends "base.html" %}
{% block title %}Submit Complaint - HostelFix{% endblock %}

{% block content %}
<section class="page-band">
    <div class="container narrow">
        <div class="section-head">
            <div>
                <span class="eyebrow">New Request</span>
                <h1>Submit a Hostel Complaint</h1>
            </div>
        </div>

        <form class="form-panel" action="{{ url_for('submit_complaint') }}" method="post" enctype="multipart/form-data">
            <div class="row g-4">
                <div class="col-md-8">
                    <label class="form-label">Complaint Title</label>
                    <input class="form-control form-control-lg" type="text" name="title" placeholder="Water leakage near washroom" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Priority</label>
                    <select class="form-select form-select-lg" name="priority">
                        <option>Low</option>
                        <option selected>Medium</option>
                        <option>High</option>
                        <option>Urgent</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Category</label>
                    <select class="form-select form-select-lg" name="category" required>
                        <option value="">Choose category</option>
                        {% for category in categories %}
                            <option>{{ category }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Upload Image Optional</label>
                    <input class="form-control form-control-lg" type="file" name="image" accept="image/*">
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" name="description" rows="6" placeholder="Explain the issue, location, and urgency..." required></textarea>
                </div>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('student_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                <button class="btn btn-primary btn-lg" type="submit">Submit Complaint</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
